<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Veritas KE</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-r from-blue-100 via-purple-100 to-blue-100 min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-blue-900 shadow-md p-4 fixed top-0 left-0 w-full z-50">
    <div class="container mx-auto flex items-center space-x-4 justify-center">
      <img src="./Veritas.png" alt="Veritas Logo" class="w-12 h-12 animate-bounce">
      <div class="text-left animate-bounce">
        <h1 class="text-2xl font-bold text-yellow-700">Veritas KE</h1>
        <p class="text-sm text-yellow-600 font-semibold">Truth In Every Task</p>
      </div>
    </div>
  </nav>

  <!-- Spacer below navbar -->
  <div class="h-24"></div>

  <!-- Signup form -->
  <main class="flex-1 flex items-center justify-center px-4">
    <div class="bg-white p-8 rounded-xl shadow-xl w-full max-w-md">
      <h1 class="text-3xl font-bold text-center text-blue-900 mb-6">Create Account</h1>
      
      <form id="signupForm" class="space-y-4">
        <div>
          <label class="block mb-1 text-gray-700">Email Address</label>
          <input type="email" name="email" id="email" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-900">
        </div>

        <div>
          <label class="block mb-1 text-gray-700">Password</label>
          <input type="password" name="password" id="password" required minlength="6" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-900">
        </div>

        <div>
          <label class="block mb-1 text-gray-700">Confirm Password</label>
          <input type="password" name="confirmPassword" id="confirmPassword" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-900">
        </div>

        <div id="errorMsg" class="text-red-600 text-sm font-medium hidden"></div>

        <button type="submit" class="w-full bg-blue-900 text-white font-semibold py-2 rounded hover:bg-yellow-400 hover:text-blue-900 transition">Sign Up</button>
      </form>

      <p class="mt-4 text-center text-sm text-gray-700">Already have an account? 
        <a href="./login.html" class="text-blue-900 font-semibold hover:underline">Log in here</a>
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-blue-900 text-center py-6 shadow-inner border-t">
    <p class="text-sm text-yellow-500 font-medium">
      © <span id="year"></span> Veritas KE — Truth In Every Task
    </p>
  </footer>

  <!-- Auto update year -->
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

  <!-- Firebase Signup Logic -->
  <script type="module">
    import { auth } from './js/firebase.js';
    import { createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js';

    const signupForm = document.getElementById("signupForm");
    const errorMsg = document.getElementById("errorMsg");

    signupForm.addEventListener("submit", async function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      errorMsg.classList.add("hidden");

      if (!email.includes("@") || !email.includes(".")) {
        errorMsg.textContent = "⚠️ Please enter a valid email address.";
        errorMsg.classList.remove("hidden");
        return;
      }

      if (password.length < 6) {
        errorMsg.textContent = "⚠️ Password must be at least 6 characters.";
        errorMsg.classList.remove("hidden");
        return;
      }

      if (password !== confirmPassword) {
        errorMsg.textContent = "⚠️ Passwords do not match.";
        errorMsg.classList.remove("hidden");
        return;
      }

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        alert("✅ Account created successfully!");
        window.location.href = "login.html";
      } catch (error) {
        errorMsg.textContent = `❌ ${error.message}`;
        errorMsg.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
